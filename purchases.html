<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchases - Forge</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background:#0a0a0a; color:#fff; }
    nav { background:#111; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
    .logo { color:#ff6a00; text-decoration:none; font-size:1.6rem; font-weight:700; letter-spacing:2px; }
    .nav-links { display:flex; gap:25px; }
    .nav-links a { text-decoration:none; color:#fff; font-weight:500; padding:8px 12px; border-radius:6px; transition:0.3s; }
    .nav-links a:hover { background-color:#ff6a00; color:#000; }
    .menu-toggle { display:none; font-size:1.5rem; cursor:pointer; color:#fff; }
    .wrap { max-width:1000px; margin:30px auto; padding:0 20px; }
    h1 { color:#ff6a00; margin-bottom:20px; }
    .order { background:#1e1e1e; border:1px solid #2f2f2f; border-radius:12px; padding:16px; margin-bottom:16px; }
    .top { display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
    .badge { background:#2a2a2a; color:#ff6a00; border:1px solid #444; padding:5px 8px; border-radius:8px; }
    ul { padding-left:18px; color:#d0d0d0; }
    pre { margin-top:10px; background:#121212; border:1px solid #2f2f2f; padding:10px; border-radius:8px; overflow:auto; }
    @media (max-width:768px) {
      .nav-links { display:none; }
      .nav-links.mobile-active {
        display:flex;
        flex-direction:column;
        position:absolute;
        top:60px;
        right:30px;
        background-color:#111;
        padding:15px;
        border-radius:8px;
      }
      .menu-toggle { display:block; }
    }
    .bottom-bar {
      width: 100%;
      background-color: #111;
      border-top: 1px solid #2a2a2a;
      padding: 18px 20px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .bottom-bar a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      transition: 0.3s;
    }
    .bottom-bar a:hover {
      background-color: #ff6a00;
      color: #000;
    }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="index.html">Forge</a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
      <a href="shop.html">Pre-Built Keyboards</a>
      <a href="builder.html">Custom Keyboards</a>
      <a href="about.html">About</a>
      <a href="faqs.html">FAQs</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login/Sign-Up</a>
      <a href="cart.html">Cart</a>
    </div>
  </nav>

  <div class="wrap">
    <h1>Purchase History</h1>
    <div id="orders"></div>
  </div>

  <!-- Bottom Link Bar -->
  <div class="bottom-bar">
    <a href="index.html">Home</a>
    <a href="login.html">Login/Sign-Up</a>
    <a href="about.html">About</a>
    <a href="faqs.html">FAQs</a>
    <a href="contact.html">Contact Us</a>
    <a href="admin.html">Admin</a>
  </div>

  <script>
    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      nav.classList.toggle('mobile-active');
    }

    function getSession(){ return JSON.parse(sessionStorage.getItem('sessionUser') || localStorage.getItem('sessionUser') || 'null'); }
    function logout(){ sessionStorage.removeItem('sessionUser'); localStorage.removeItem('sessionUser'); window.location.href='login.html'; }
    const session = getSession();
    if (!session) window.location.href = 'login.html';
    if (session && session.role === 'admin') window.location.href = 'admin-dashboard.html';

    const byUser = JSON.parse(localStorage.getItem('purchaseHistoryByUser') || '{}');
    const orders = (session && byUser[session.email]) || [];
    const el = document.getElementById('orders');

    if (!orders.length) {
      el.innerHTML = '<div class="order">No purchases yet.</div>';
    } else {
      el.innerHTML = orders.slice().reverse().map((o) => `
        <div class="order">
          <div class="top">
            <div><strong>Order #${o.orderNumber}</strong> • ${new Date(o.placedAt).toLocaleString()}</div>
            <div class="badge">${o.status}</div>
          </div>
          <ul>
            ${o.items.map(i => `<li>${i.quantity} × ${i.name} (${i.price})</li>`).join('')}
          </ul>
          <pre>${o.receipt}</pre>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
