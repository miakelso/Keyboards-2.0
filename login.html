<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Login / Sign-Up - Forge</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
		body { background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
		nav { width: 100%; background: #111; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
		.logo { color: #ff6a00; text-decoration: none; font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; }
		.nav-links { display: flex; gap: 25px; }
		.nav-links a {
			text-decoration: none;
			color: #fff;
			font-weight: 500;
			padding: 8px 12px;
			border-radius: 6px;
			transition: 0.3s;
		}
		.nav-links a:hover { background-color: #ff6a00; color: #000; }
		.menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: #fff; }
		.shell { max-width: 980px; margin: 40px auto; padding: 0 20px; width: 100%; flex: 1; }
		.auth {
			background: linear-gradient(180deg, #1a1a1a, #151515);
			border: 1px solid #2c2c2c;
			border-radius: 16px;
			display: grid;
			grid-template-columns: 1fr 1.2fr;
			overflow: hidden;
		}
		.hero { background: radial-gradient(circle at 20% 20%, #2a2a2a, #141414); padding: 28px; }
		.hero h1 { color: #ff6a00; margin-bottom: 10px; }
		.hero p { color: #cfcfcf; line-height: 1.5; }
		.panel { padding: 28px; }
		.tabs { display: flex; gap: 10px; margin-bottom: 20px; }
		.tabs button {
			background: #272727;
			border: 1px solid #3a3a3a;
			color: #fff;
			padding: 10px 14px;
			border-radius: 10px;
			cursor: pointer;
			font-weight: 600;
		}
		.tabs button.active { background: #ff6a00; color: #000; border-color: #ff6a00; }
		form { display: none; }
		form.active { display: block; }
		.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
		.full { grid-column: span 2; }
		label { font-size: 0.9rem; color: #bdbdbd; }
		input {
			width: 100%;
			margin-top: 6px;
			background: #101010;
			border: 1px solid #2f2f2f;
			color: #fff;
			padding: 10px;
			border-radius: 10px;
		}
		.submit {
			margin-top: 14px;
			width: 100%;
			background: #ff6a00;
			color: #000;
			border: none;
			border-radius: 10px;
			padding: 11px;
			font-weight: 700;
			cursor: pointer;
		}
		.hint { margin-top: 10px; color: #a8a8a8; font-size: 0.9rem; }
		.msg { margin-top: 10px; color: #ffb77a; }
		@media (max-width: 900px) {
			.auth { grid-template-columns: 1fr; }
			.grid { grid-template-columns: 1fr; }
			.full { grid-column: span 1; }
		}
		@media (max-width: 768px) {
			.nav-links { display: none; }
			.nav-links.mobile-active {
				display: flex;
				flex-direction: column;
				position: absolute;
				top: 60px;
				right: 30px;
				background-color: #111;
				padding: 15px;
				border-radius: 8px;
			}
			.menu-toggle { display: block; }
		}
		.bottom-bar {
			width: 100%;
			background-color: #111;
			border-top: 1px solid #2a2a2a;
			padding: 18px 20px;
			display: flex;
			justify-content: center;
			gap: 18px;
			flex-wrap: wrap;
		}
		.bottom-bar a {
			color: #fff;
			text-decoration: none;
			font-weight: 500;
			padding: 8px 12px;
			border-radius: 6px;
			transition: 0.3s;
		}
		.bottom-bar a:hover {
			background-color: #ff6a00;
			color: #000;
		}
	</style>
	
</head>
<body>
	<nav>
		<a href="index.html" class="logo">Forge</a>
	</nav>

	<div class="shell">
		<div class="auth">
			<div class="hero">
				<h1>Welcome to Forge</h1>
				<p>Log in to manage builds, purchases, account and billing. Sign up to create a new account and get a confirmation email.</p>
				<p class="hint" style="margin-top:16px;">Admin accounts sign in from the Admin page.</p>
			</div>

			<div class="panel">
				<div class="tabs">
					<button id="tabLogin" class="active" onclick="showTab('login')">Login</button>
					<button id="tabSignup" onclick="showTab('signup')">Sign-Up</button>
				</div>

				<form id="loginForm" class="active">
					<div class="grid">
						<div class="full">
							<label>Email
								<input id="loginEmail" type="email" required />
							</label>
						</div>
						<div class="full">
							<label>Password
								<input id="loginPassword" type="password" required />
							</label>
						</div>
					</div>
					<button type="submit" class="submit">Login</button>
					<div style="margin-top: 14px; text-align: center;">
						<a href="forgot-password.html" style="color: #ff6a00; text-decoration: none; font-weight: 500;">Forgot Password?</a>
					</div>
				</form>

				<form id="signupForm">
					<div class="grid">
						<div>
							<label>First Name
								<input id="firstName" required />
							</label>
						</div>
						<div>
							<label>Last Name
								<input id="lastName" required />
							</label>
						</div>
						<div class="full">
							<label>Address 1
								<input id="address1" required />
							</label>
						</div>
						<div class="full">
							<label>Address 2
								<input id="address2" />
							</label>
						</div>
						<div>
							<label>City
								<input id="city" required />
							</label>
						</div>
						<div>
							<label>State / Province
								<input id="stateProvince" required />
							</label>
						</div>
						<div>
							<label>Zip / Postal Code
								<input id="zipPostalCode" required />
							</label>
						</div>
						<div>
							<label>Country
								<input id="country" required />
							</label>
						</div>
						<div class="full">
							<label>Email
								<input id="signupEmail" type="email" required />
							</label>
						</div>
						<div class="full">
							<label>Password
								<input id="signupPassword" type="password" required />
							</label>
						</div>
					</div>
					<button type="submit" class="submit">Create Account</button>
				</form>
				<p id="msg" class="msg"></p>
			</div>
		</div>
	</div>

	<footer class="bottom-bar">
		<a href="index.html">Home</a>
		<a href="login.html">Login/Sign-Up</a>
		<a href="about.html">About</a>
		<a href="faqs.html">FAQs</a>
		<a href="contact.html">Contact Us</a>
		<a href="admin.html">Admin</a>
	</footer>

	

	<script src="api-config.js"></script>
	<script>
		const API_URL = window.FORGE_API_URL || 'http://localhost:8080';

		function toggleMenu() {
			const nav = document.getElementById('navLinks');
			nav.classList.toggle('mobile-active');
		}

		function showTab(tab) {
			const loginForm = document.getElementById('loginForm');
			const signupForm = document.getElementById('signupForm');
			const tabLogin = document.getElementById('tabLogin');
			const tabSignup = document.getElementById('tabSignup');
			if (tab === 'login') {
				loginForm.classList.add('active');
				signupForm.classList.remove('active');
				tabLogin.classList.add('active');
				tabSignup.classList.remove('active');
			} else {
				signupForm.classList.add('active');
				loginForm.classList.remove('active');
				tabSignup.classList.add('active');
				tabLogin.classList.remove('active');
			}
		}

		function getActiveSession() {
			return JSON.parse(sessionStorage.getItem('sessionUser') || localStorage.getItem('sessionUser') || 'null');
		}

		async function sendSignupConfirmationEmail(user) {
			const subject = encodeURIComponent('Welcome to Forge — Account Created');
			const body = encodeURIComponent(`Hi ${user.firstName},\n\nYour Forge account was created successfully for ${user.email}.\n\n- Forge Team`);
			window.location.href = `mailto:${user.email}?subject=${subject}&body=${body}`;
		}

		function processPendingCustomBuild(user) {
			if (!user || user.role !== 'user') return false;
			const pendingRaw = localStorage.getItem('pendingCustomBuild');
			if (!pendingRaw) return false;

			try {
				const pendingBuild = JSON.parse(pendingRaw);
				if (!pendingBuild || !pendingBuild.name) return false;

				const buildsByUser = JSON.parse(localStorage.getItem('customBuildsByUser') || '{}');
				if (!buildsByUser[user.email]) buildsByUser[user.email] = [];
				buildsByUser[user.email].push({
					...pendingBuild,
					savedAt: pendingBuild.savedAt || new Date().toISOString()
				});
				localStorage.setItem('customBuildsByUser', JSON.stringify(buildsByUser));
				localStorage.removeItem('pendingCustomBuild');
				return true;
			} catch (error) {
				localStorage.removeItem('pendingCustomBuild');
				return false;
			}
		}

		// If already logged in, skip auth form and send user to their dashboard.
		const activeSession = getActiveSession();
		if (activeSession) {
			if (activeSession.role === 'admin') {
				window.location.href = 'admin-dashboard.html';
			} else {
				window.location.href = 'custom-builds.html';
			}
		}

		document.getElementById('signupForm').addEventListener('submit', async (e) => {
			e.preventDefault();
			const msg = document.getElementById('msg');
			msg.textContent = '';

			const email = signupEmail.value.trim().toLowerCase();

			const address = {
				address1: address1.value.trim(),
				address2: address2.value.trim(),
				city: city.value.trim(),
				stateProvince: stateProvince.value.trim(),
				zipPostalCode: zipPostalCode.value.trim(),
				country: country.value.trim()
			};

			const fullAddress = `${address.address1}${address.address2 ? `, ${address.address2}` : ''}, ${address.city}, ${address.stateProvince}, ${address.zipPostalCode}, ${address.country}`;

			const user = {
				firstName: firstName.value.trim(),
				lastName: lastName.value.trim(),
				email,
				password: signupPassword.value,
				address: fullAddress,
				addressDetails: address,
				addressLine1: address.address1,
				addressLine2: address.address2,
				city: address.city,
				stateProvince: address.stateProvince,
				zipPostalCode: address.zipPostalCode,
				country: address.country,
				addressText: fullAddress,
				addressLegacy: fullAddress
			};

			try {
				const response = await fetch(`${API_URL}/signup-user`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify(user)
				});
				const data = await response.json();

				if (!response.ok || !data.success) {
					msg.textContent = data.error || 'Unable to create account right now.';
					return;
				}

				await sendSignupConfirmationEmail(user);
				msg.textContent = 'Account created. A confirmation email draft was opened for the provided email.';
				showTab('login');
				loginEmail.value = user.email;
			} catch (err) {
				msg.textContent = 'Could not connect to account service.';
			}
		});

		document.getElementById('loginForm').addEventListener('submit', async (e) => {
			e.preventDefault();
			const msg = document.getElementById('msg');
			msg.textContent = '';

			const email = loginEmail.value.trim().toLowerCase();
			const password = loginPassword.value;

			try {
				const response = await fetch(`${API_URL}/login-user`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ email, password })
				});
				const data = await response.json();

				if (!response.ok || !data.success) {
					msg.textContent = data.error || 'Invalid email or password.';
					return;
				}

				const user = data.user;
				sessionStorage.setItem('sessionUser', JSON.stringify({
					id: user.id,
					role: user.role,
					email: user.email,
					firstName: user.firstName,
					lastName: user.lastName
				}));
				localStorage.removeItem('sessionUser');

				processPendingCustomBuild(user);
				window.location.href = 'custom-builds.html';
			} catch (err) {
				msg.textContent = 'Could not connect to login service.';
			}
		});
	</script>
</body>
</html>
