<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Forgot Password - Forge</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
		body { background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
		nav { width: 100%; background: #111; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
		.logo { color: #ff6a00; text-decoration: none; font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; }
		.nav-links { display: flex; gap: 25px; }
		.nav-links a {
			text-decoration: none;
			color: #fff;
			font-weight: 500;
			padding: 8px 12px;
			border-radius: 6px;
			transition: 0.3s;
		}
		.nav-links a:hover { background-color: #ff6a00; color: #000; }
		.menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: #fff; }
		.shell { max-width: 600px; margin: 60px auto; padding: 0 20px; width: 100%; flex: 1; }
		.reset-container {
			background: linear-gradient(180deg, #1a1a1a, #151515);
			border: 1px solid #2c2c2c;
			border-radius: 16px;
			padding: 40px;
		}
		.reset-container h1 { color: #ff6a00; margin-bottom: 10px; font-size: 1.8rem; }
		.reset-container p { color: #cfcfcf; line-height: 1.6; margin-bottom: 25px; }
		form { display: block; }
		label { font-size: 0.9rem; color: #bdbdbd; display: block; margin-bottom: 6px; }
		input {
			width: 100%;
			margin-bottom: 20px;
			background: #101010;
			border: 1px solid #2f2f2f;
			color: #fff;
			padding: 12px;
			border-radius: 10px;
			font-size: 1rem;
		}
		input:focus {
			outline: none;
			border-color: #ff6a00;
			box-shadow: 0 0 8px rgba(255, 106, 0, 0.2);
		}
		.submit {
			width: 100%;
			background: #ff6a00;
			color: #000;
			border: none;
			border-radius: 10px;
			padding: 12px;
			font-weight: 700;
			cursor: pointer;
			font-size: 1rem;
			transition: 0.3s;
		}
		.submit:hover { background: #ff8c33; }
		.msg { margin-top: 15px; padding: 12px; border-radius: 10px; text-align: center; }
		.msg.success { color: #4caf50; background: rgba(76, 175, 80, 0.1); border: 1px solid #4caf50; }
		.msg.error { color: #f44336; background: rgba(244, 67, 54, 0.1); border: 1px solid #f44336; }
		.back-link { text-align: center; margin-top: 20px; }
		.back-link a { color: #ff6a00; text-decoration: none; font-weight: 500; }
		.back-link a:hover { text-decoration: underline; }
		.bottom-bar {
			width: 100%;
			background-color: #111;
			border-top: 1px solid #2a2a2a;
			padding: 18px 20px;
			display: flex;
			justify-content: center;
			gap: 18px;
			flex-wrap: wrap;
			margin-top: auto;
		}
		.bottom-bar a {
			color: #fff;
			text-decoration: none;
			font-weight: 500;
			padding: 8px 12px;
			border-radius: 6px;
			transition: 0.3s;
		}
		.bottom-bar a:hover {
			background-color: #ff6a00;
			color: #000;
		}
		@media (max-width: 768px) {
			.nav-links { display: none; }
			.nav-links.mobile-active {
				display: flex;
				flex-direction: column;
				position: absolute;
				top: 60px;
				right: 30px;
				background-color: #111;
				padding: 15px;
				border-radius: 8px;
			}
			.menu-toggle { display: block; }
			.shell { margin: 30px auto; }
			.reset-container { padding: 25px; }
		}
	</style>
</head>
<body>
	<nav>
		<a href="index.html" class="logo">Forge</a>
	</nav>

	<div class="shell">
		<div class="reset-container">
			<h1>Reset Password</h1>
			<p>Enter your email address and we'll send you instructions to reset your password.</p>

			<form id="resetForm">
				<label for="resetEmail">Email Address</label>
				<input 
					type="email" 
					id="resetEmail" 
					placeholder="your@email.com" 
					required 
				/>
				<button type="submit" class="submit">Send Reset Instructions</button>
			</form>

			<p id="msg" class="msg" style="display: none;"></p>

			<div class="back-link">
				<a href="login.html">← Back to Login</a>
			</div>
		</div>
	</div>

	<footer class="bottom-bar">
		<a href="index.html">Home</a>
		<a href="login.html">Login/Sign-Up</a>
		<a href="about.html">About</a>
		<a href="faqs.html">FAQs</a>
		<a href="contact.html">Contact Us</a>
		<a href="admin.html">Admin</a>
	</footer>

	<script src="api-config.js"></script>
	<script>
		const API_URL = window.FORGE_API_URL || 'http://localhost:8080';

		// If already logged in, redirect to dashboard
		const activeSession = JSON.parse(sessionStorage.getItem('sessionUser') || localStorage.getItem('sessionUser') || 'null');
		if (activeSession) {
			if (activeSession.role === 'admin') {
				window.location.href = 'admin-dashboard.html';
			} else {
				window.location.href = 'custom-builds.html';
			}
		}

		document.getElementById('resetForm').addEventListener('submit', async (e) => {
			e.preventDefault();
			const msg = document.getElementById('msg');
			const resetEmail = document.getElementById('resetEmail').value.trim().toLowerCase();
			
			msg.textContent = '';
			msg.style.display = 'none';

			try {
				const response = await fetch(`${API_URL}/request-password-reset`, {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ email: resetEmail })
				});
				const data = await response.json();

				if (!response.ok) {
					msg.textContent = data.error || 'Unable to process your request.';
					msg.className = 'msg error';
					msg.style.display = 'block';
					return;
				}

				msg.textContent = `Reset instructions have been sent to ${resetEmail}. Please check your email and follow the link to reset your password.`;
				msg.className = 'msg success';
				msg.style.display = 'block';
				document.getElementById('resetForm').style.display = 'none';
			} catch (err) {
				msg.textContent = 'Could not connect to the service. Please try again later.';
				msg.className = 'msg error';
				msg.style.display = 'block';
			}
		});
	</script>
</body>
</html>
