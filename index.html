<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge - Mechanical Keyboards</title>
  <link rel="stylesheet" href="theme.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: #222739;
      color: #E3D7D8;
      scroll-behavior: smooth;
    }

    /* Navbar */
    nav {
      width: 100%;
      background-color: #3C5F6E;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 10px rgba(34,39,57,0.45);
    }

    .logo {
      font-size: 1.8rem;
      font-weight: bold;
      color: #E6A879;
      text-decoration: none;
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 25px;
    }

    .nav-links a {
      text-decoration: none;
      color: #E3D7D8;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      transition: 0.3s;
    }

    .nav-links a:hover {
      background-color: #E6A879;
      color: #222739;
    }

    .menu-toggle {
      display: none;
      font-size: 1.5rem;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .nav-links.mobile-active {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 60px;
        right: 30px;
        background-color: #3C5F6E;
        padding: 15px;
        border-radius: 8px;
      }
      .menu-toggle {
        display: block;
      }
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 6rem;
      font-weight: bold;
      color: #E6A879;
      text-shadow: 2px 2px #222739;
      background-color: #222739;
    }

    .hero img {
      width: 100% !important;
      height: 100% !important;
      max-width: none;
      max-height: none;
      object-fit: fill;
      border: none !important;
      border-radius: 0 !important;
      padding: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
    }

    /* Sections for pre-built & custom */
    .section-container {
      display: flex;
      flex-direction: row;
      gap: 50px;
      padding: 50px 20px;
      align-items: center;
      justify-content: center;
      background-color: #3C5F6E;
    }

    .card {
      width: 45%;
      max-width: 500px;
      height: 400px;
      background-size: cover;
      background-position: center;
      border-radius: 20px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 15px 40px rgba(34,39,57,0.55);
    }

    .card-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(60,95,110,0.72);
      transition: background 0.3s;
    }

    .card:hover .card-overlay {
      background: rgba(60,95,110,0.58);
    }

    .card-content {
      position: relative;
      color: #E3D7D8;
      text-align: center;
      padding-bottom: 40px;
    }

    .card-content h2 {
      font-size: 2rem;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .card-content a {
      display: inline-block;
      padding: 12px 30px;
      background-color: #E6A879;
      color: #3C5F6E;
      border: 1px solid #8DD6D3;
      font-weight: bold;
      border-radius: 10px;
      text-decoration: none;
      transition: 0.3s;
    }

    .card-content a:hover {
      background-color: #8DD6D3;
      color: #3C5F6E;
    }

    /* Bottom Link Bar */
    .bottom-bar {
      width: 100%;
      background-color: #3C5F6E;
      border-top: 1px solid #8DD6D3;
      padding: 18px 20px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .bottom-bar a {
      color: #E3D7D8;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      transition: 0.3s;
    }

    .bottom-bar a:hover {
      background-color: #E6A879;
      color: #222739;
    }

    @media (max-width: 768px) {
      .hero {
        font-size: 4rem;
      }
      .section-container {
        flex-direction: column;
      }
      .card {
        width: 90%;
        height: 300px;
      }
      .card-content h2 {
        font-size: 1.5rem;
      }
    }

  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <a href="index.html" class="logo">KeyForge</a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
      <a href = "index.html">Home</a>
      <a href="shop.html">Pre-Built Keyboards</a>
      <a href="builder.html">Custom Keyboards</a>
      <a href="about.html">About</a>
      <a href="faqs.html">FAQs</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login/Sign-Up</a>
      <a href="cart.html">Cart</a>
    </div>
  </nav>

  <!-- Hero / Logo Section -->
  <div class="hero">
    <img src="KeyForge_logo.jpeg" alt="KeyForge logo">
  </div>

  <!-- Two main sections -->
  <div class="section-container">
    <div class="card" style="background-image: url('Clicky Classic.png');">
      <div class="card-overlay"></div>
      <div class="card-content">
        <h2>Shop Pre-Built Keyboards</h2>
        <a href="shop.html">Shop Now</a>
      </div>
    </div>

    <div class="card" style="background-image: url('RGB Elite.png');">
      <div class="card-overlay"></div>
      <div class="card-content">
        <h2>Create Custom Keyboards</h2>
        <a href="builder.html">Build Now</a>
      </div>
    </div>
  </div>

  <!-- Bottom Link Bar -->
  <div class="bottom-bar">
    <a href="index.html">Home</a>
    <a href="login.html">Login/Sign-Up</a>
    <a href="about.html">About</a>
    <a href="faqs.html">FAQs</a>
    <a href="contact.html">Contact Us</a>
    <a href="admin.html">Admin</a>
  </div>

  <script>
    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      nav.classList.toggle('mobile-active');
    }
  </script>

</body>
</html>
