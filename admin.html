<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Forge</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background:#0a0a0a; color:#fff; min-height:100vh; }
    nav { background:#111; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; }
    .logo { color:#ff6a00; text-decoration:none; font-size:1.6rem; font-weight:700; letter-spacing:2px; }
    .nav-links { display:flex; gap:25px; }
    .nav-links a { text-decoration:none; color:#fff; font-weight:500; padding:8px 12px; border-radius:6px; transition:0.3s; }
    .nav-links a:hover { background-color:#ff6a00; color:#000; }
    .menu-toggle { display:none; font-size:1.5rem; cursor:pointer; color:#fff; }
    .wrap { max-width:520px; margin:60px auto; padding:0 20px; }
    .card { background:#1e1e1e; border:1px solid #2f2f2f; border-radius:14px; padding:24px; }
    h1 { color:#ff6a00; margin-bottom:8px; }
    p { color:#c8c8c8; margin-bottom:18px; }
    label { display:block; color:#bdbdbd; font-size:0.9rem; margin-top:12px; }
    input { width:100%; background:#121212; color:#fff; border:1px solid #333; border-radius:10px; padding:10px; margin-top:6px; }
    button { width:100%; margin-top:18px; background:#ff6a00; color:#000; border:none; border-radius:10px; padding:11px; font-weight:700; cursor:pointer; }
    .msg { margin-top:10px; color:#ffb77a; }
    .hint { margin-top:10px; color:#8f8f8f; font-size:0.9rem; }
    @media (max-width:768px) {
      .nav-links { display:none; }
      .nav-links.mobile-active {
        display:flex;
        flex-direction:column;
        position:absolute;
        top:60px;
        right:30px;
        background-color:#111;
        padding:15px;
        border-radius:8px;
      }
      .menu-toggle { display:block; }
    }
    .bottom-bar {
      width: 100%;
      background-color: #111;
      border-top: 1px solid #2a2a2a;
      padding: 18px 20px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .bottom-bar a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      transition: 0.3s;
    }
    .bottom-bar a:hover {
      background-color: #ff6a00;
      color: #000;
    }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="index.html">KeyForge</a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
      <a href="shop.html">Pre-Built Keyboards</a>
      <a href="builder.html">Custom Keyboards</a>
      <a href="about.html">About</a>
      <a href="faqs.html">FAQs</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login/Sign-Up</a>
      <a href="cart.html">Cart</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="card">
      <h1>Admin Login</h1>
      <p>Sign in with an administrator account to access the admin dashboard.</p>

      <form id="adminLoginForm">
        <label>Email
          <input id="adminEmail" type="email" required />
        </label>
        <label>Password
          <input id="adminPassword" type="password" required />
        </label>
        <button type="submit">Login as Admin</button>
      </form>
      <div id="msg" class="msg"></div>
      <div class="hint">Default admin demo: admin@forge.com / Admin123!</div>
    </div>
  </div>

  <!-- Bottom Link Bar -->
  <div class="bottom-bar">
    <a href="index.html">Home</a>
    <a href="login.html">Login/Sign-Up</a>
    <a href="about.html">About</a>
    <a href="faqs.html">FAQs</a>
    <a href="contact.html">Contact Us</a>
    <a href="admin.html">Admin</a>
  </div>

  <script src="api-config.js"></script>
  <script>
    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      nav.classList.toggle('mobile-active');
    }

    const API_URL = window.FORGE_API_URL || 'http://localhost:8080';

    function getSession(){ return JSON.parse(sessionStorage.getItem('sessionUser') || localStorage.getItem('sessionUser') || 'null'); }

    // Fetch admin list from backend
    async function loadAdminsFromBackend() {
      try {
        const response = await fetch(`${API_URL}/get-admins`);
        if (!response.ok) {
          console.error('Failed to load admins from backend');
          return [];
        }
        return await response.json();
      } catch (error) {
        console.error('Backend not available:', error);
        return [];
      }
    }

    const session = getSession();
    if (session && session.role === 'admin') {
      window.location.href = 'admin-dashboard.html';
    }

    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = adminEmail.value.trim().toLowerCase();
      const password = adminPassword.value;
      
      // Load admins from backend
      const admins = await loadAdminsFromBackend();
      const admin = admins.find(u => u.email === email && u.password === password && u.role === 'admin');

      if (!admin) {
        msg.textContent = 'Invalid admin credentials.';
        return;
      }

      sessionStorage.setItem('sessionUser', JSON.stringify({
        id: admin.id,
        role: admin.role,
        email: admin.email,
        firstName: admin.firstName,
        lastName: admin.lastName
      }));
      localStorage.removeItem('sessionUser');
      window.location.href = 'admin-dashboard.html';
    });
  </script>
</body>
</html>
