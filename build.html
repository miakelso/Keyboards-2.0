<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Redirect - Forge</title>
  <meta http-equiv="refresh" content="0; url=builder.html" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #0a0a0a; color: #fff; }
    nav { width: 100%; background: #111; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .logo { color: #ff6a00; text-decoration: none; font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 25px; }
    .nav-links a { text-decoration: none; color: #fff; font-weight: 500; padding: 8px 12px; border-radius: 6px; transition: 0.3s; }
    .nav-links a:hover { background-color: #ff6a00; color: #000; }
    .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: #fff; }
    p { padding: 20px 30px; }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-links.mobile-active {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 60px;
        right: 30px;
        background-color: #111;
        padding: 15px;
        border-radius: 8px;
      }
      .menu-toggle { display: block; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">Forge</a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
      <a href="shop.html">Pre-Built Keyboards</a>
      <a href="builder.html">Custom Keyboards</a>
      <a href="about.html">About</a>
      <a href="faqs.html">FAQs</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login / Sign-Up</a>
      <a href="cart.html">Cart</a>
    </div>
  </nav>
  <p>Redirecting to Custom Builder...</p>
  <script>
    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      nav.classList.toggle('mobile-active');
    }

    window.location.replace('builder.html');
  </script>
</body>
</html>
