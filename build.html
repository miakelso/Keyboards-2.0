<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Build Redirect - Forge</title>
  <link rel="stylesheet" href="theme.css" />
  <meta http-equiv="refresh" content="0; url=builder.html" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #222739; color: #E3D7D8; }
    nav { width: 100%; background: #3C5F6E; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 10px rgba(34,39,57,0.45); }
    .logo { color: #E6A879; text-decoration: none; font-size: 1.8rem; font-weight: 700; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 25px; }
    .nav-links a { text-decoration: none; color: #E3D7D8; font-weight: 500; padding: 8px 12px; border-radius: 6px; transition: 0.3s; }
    .nav-links a:hover { background-color: #E6A879; color: #222739; }
    .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: #E3D7D8; }
    p { padding: 20px 30px; }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-links.mobile-active {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 60px;
        right: 30px;
        background-color: #3C5F6E;
        padding: 15px;
        border-radius: 8px;
      }
      .menu-toggle { display: block; }
    }
    .bottom-bar {
      width: 100%;
      background-color: #3C5F6E;
      border-top: 1px solid #8DD6D3;
      padding: 18px 20px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .bottom-bar a {
      color: #E3D7D8;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      transition: 0.3s;
    }
    .bottom-bar a:hover {
      background-color: #E6A879;
      color: #222739;
    }
    p { color: #E3D7D8; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">KeyForge</a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
      <a href="shop.html">Pre-Built Keyboards</a>
      <a href="builder.html">Custom Keyboards</a>
      <a href="about.html">About</a>
      <a href="faqs.html">FAQs</a>
      <a href="contact.html">Contact</a>
      <a href="login.html">Login/Sign-Up</a>
      <a href="cart.html">Cart</a>
    </div>
  </nav>

  <!-- Bottom Link Bar -->
  <div class="bottom-bar">
    <a href="index.html">Home</a>
    <a href="login.html">Login/Sign-Up</a>
    <a href="about.html">About</a>
    <a href="faqs.html">FAQs</a>
    <a href="contact.html">Contact Us</a>
    <a href="admin.html">Admin</a>
  </div>

  <p>Redirecting to Custom Builder...</p>
  <script>
    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      nav.classList.toggle('mobile-active');
    }

    window.location.replace('builder.html');
  </script>
</body>
</html>
