<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account - Forge</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
    nav { width: 100%; background: #111; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .logo { color: #ff6a00; text-decoration: none; font-size: 1.6rem; font-weight: 700; letter-spacing: 2px; }
    .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
    .nav-links a, .nav-links button { color: #fff; text-decoration: none; background: #222; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    .nav-links a.active { background: #ff6a00; color: #000; font-weight: 700; }
    .menu-toggle { display: none; font-size: 1.5rem; cursor: pointer; color: #fff; }
    .wrap { max-width: 900px; margin: 30px auto; padding: 20px; width: 100%; flex: 1; }
    .card { background: #1e1e1e; border: 1px solid #2f2f2f; border-radius: 14px; padding: 24px; }
    h1 { color: #ff6a00; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { font-size: 0.9rem; color: #bdbdbd; }
    input { width: 100%; background: #121212; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 10px; margin-top: 6px; }
    .full { grid-column: span 2; }
    .actions { margin-top: 16px; display: flex; gap: 10px; }
    button.primary { background: #ff6a00; color: #000; border: none; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
    .msg { margin-top: 10px; color: #9be39b; }
    @media (max-width: 700px){ .grid{grid-template-columns:1fr;} .full{grid-column:span 1;} }
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-links.mobile-active {
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 60px;
        right: 30px;
        background-color: #111;
        padding: 15px;
        border-radius: 8px;
      }
      .menu-toggle { display: block; }
    }
    .bottom-bar {
      width: 100%;
      background-color: #111;
      border-top: 1px solid #2a2a2a;
      padding: 18px 20px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .bottom-bar a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      transition: 0.3s;
    }
    .bottom-bar a:hover {
      background-color: #ff6a00;
      color: #000;
    }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="index.html">KeyForge</a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
      <a href="custom-builds.html">Custom Builds</a>
      <a href="purchases.html">Purchases</a>
      <a class="active" href="account.html">Account</a>
      <a href="billing.html">Billing</a>
      <button onclick="logout()">Logout</button>
      <a href="cart.html">Cart</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="card">
      <h1>Account</h1>
      <form id="accountForm" class="grid">
        <div>
          <label>First Name
            <input id="firstName" required />
          </label>
        </div>
        <div>
          <label>Last Name
            <input id="lastName" required />
          </label>
        </div>
        <div class="full">
          <label>Address
            <input id="address" required />
          </label>
        </div>
        <div class="full">
          <label>Email
            <input id="email" type="email" required />
          </label>
        </div>
        <div class="full">
          <label>Password
            <input id="password" type="password" required />
          </label>
        </div>
        <div class="full actions">
          <button class="primary" type="submit">Save Changes</button>
        </div>
      </form>
      <p id="msg" class="msg"></p>
    </div>
  </div>

  <!-- Bottom Link Bar -->
  <footer class="bottom-bar">
    <a href="index.html">Home</a>
    <a href="login.html">Login/Sign-Up</a>
    <a href="about.html">About</a>
    <a href="faqs.html">FAQs</a>
    <a href="contact.html">Contact Us</a>
    <a href="admin.html">Admin</a>
  </footer>

  <script src="api-config.js"></script>
  <script>
    const API_URL = window.FORGE_API_URL || 'http://localhost:8080';

    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      nav.classList.toggle('mobile-active');
    }

    function getSession(){ return JSON.parse(sessionStorage.getItem('sessionUser') || localStorage.getItem('sessionUser') || 'null'); }

    function requireUser(){
      const user = getSession();
      if (!user) { window.location.href = 'login.html'; return null; }
      if (user.role === 'admin') { window.location.href = 'admin-dashboard.html'; return null; }
      return user;
    }

    function logout(){
      sessionStorage.removeItem('sessionUser');
      localStorage.removeItem('sessionUser');
      window.location.href = 'login.html';
    }

    function migrateEmailReferences(oldEmail, newEmail){
      const keys = ['userCarts', 'customBuildsByUser', 'purchaseHistoryByUser', 'billingByUser'];
      keys.forEach((key) => {
        const map = JSON.parse(localStorage.getItem(key) || '{}');
        if (map[oldEmail]) {
          map[newEmail] = map[oldEmail];
          delete map[oldEmail];
          localStorage.setItem(key, JSON.stringify(map));
        }
      });
    }

    const session = requireUser();
    if (session) {
      fetch(`${API_URL}/get-user?email=${encodeURIComponent(session.email)}`)
        .then(res => res.json())
        .then(data => {
          if (!data.success || !data.user) return;
          const current = data.user;
          firstName.value = current.firstName || '';
          lastName.value = current.lastName || '';
          address.value = current.address || '';
          email.value = current.email || '';
        })
        .catch(() => {});

      accountForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.textContent = '';

        const oldEmail = session.email;
        const nextEmail = email.value.trim().toLowerCase();

        try {
          const response = await fetch(`${API_URL}/update-user`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              oldEmail,
              firstName: firstName.value.trim(),
              lastName: lastName.value.trim(),
              address: address.value.trim(),
              email: nextEmail,
              password: password.value
            })
          });
          const data = await response.json();

          if (!response.ok || !data.success) {
            msg.textContent = data.error || 'Unable to update account.';
            return;
          }

          if (nextEmail !== oldEmail) {
            migrateEmailReferences(oldEmail, nextEmail);
          }

          const updatedSession = {
            id: session.id,
            role: 'user',
            email: nextEmail,
            firstName: firstName.value.trim(),
            lastName: lastName.value.trim()
          };
          sessionStorage.setItem('sessionUser', JSON.stringify(updatedSession));
          localStorage.removeItem('sessionUser');
          msg.textContent = 'Account updated.';
        } catch (err) {
          msg.textContent = 'Could not connect to account service.';
        }
      });
    }
  </script>
</body>
</html>
