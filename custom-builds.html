<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Custom Builds - Forge</title>
  <link rel="stylesheet" href="theme.css" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background:#222739; color:#E3D7D8; min-height: 100vh; display: flex; flex-direction: column; }
    nav { background:#3C5F6E; padding:15px 30px; display:flex; justify-content:space-between; align-items:center; box-shadow: 0 2px 10px rgba(34,39,57,0.45); }
    .logo { color:#E6A879; text-decoration:none; font-size:1.6rem; font-weight:700; letter-spacing:2px; }
    .nav-links { display:flex; gap:12px; flex-wrap:wrap; }
    .nav-links a, .nav-links button { color:#E3D7D8; text-decoration:none; background:#202838; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; }
    .nav-links a:hover, .nav-links button:hover { background:#E6A879; color:#222739; }
    .nav-links a.active { background:#E6A879; color:#222739; font-weight:700; }
    .menu-toggle { display:none; font-size:1.5rem; cursor:pointer; color:#E3D7D8; }
    .wrap { max-width:1000px; margin:30px auto; padding:0 20px; width: 100%; flex: 1; }
    h1 { color:#E6A879; margin-bottom:20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
    .card { background:#202838; border:1px solid #8DD6D3; border-radius:12px; padding:16px; }
    .card h3 { color:#E6A879; margin-bottom:8px; }
    .line { color:#E3D7D8; margin:4px 0; }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { border: none; border-radius: 8px; padding: 8px 10px; cursor: pointer; font-weight: 700; }
    .btn-modify { background: #3C5F6E; color: #E3D7D8; border: 1px solid #8DD6D3; }
    .btn-delete { background: #3C5F6E; color: #E3D7D8; border: 1px solid #8DD6D3; }
    .btn-cart { background: #E6A879; color: #222739; border: 1px solid #8DD6D3; }
    @media (max-width:768px) {
      .nav-links { display:none; }
      .nav-links.mobile-active {
        display:flex;
        flex-direction:column;
        position:absolute;
        top:60px;
        right:30px;
        background-color:#3C5F6E;
        padding:15px;
        border-radius:8px;
      }
      .menu-toggle { display:block; }
    }
    .bottom-bar {
      width: 100%;
      background-color: #3C5F6E;
      border-top: 1px solid #8DD6D3;
      padding: 18px 20px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }
    .bottom-bar a {
      color: #E3D7D8;
      text-decoration: none;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 6px;
      transition: 0.3s;
    }
    .bottom-bar a:hover {
      background-color: #E6A879;
      color: #222739;
    }
    .card a { color:#8DD6D3; }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="index.html">KeyForge</a>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="nav-links" id="navLinks">
      <a class="active" href="custom-builds.html">Custom Builds</a>
      <a href="purchases.html">Purchases</a>
      <a href="account.html">Account</a>
      <a href="billing.html">Billing</a>
      <button onclick="logout()">Logout</button>
      <a href="cart.html">Cart</a>
    </div>
  </nav>

  <div class="wrap">
    <h1>Saved Custom Builds</h1>
    <div id="list" class="grid"></div>
  </div>

  <!-- Bottom Link Bar -->
  <footer class="bottom-bar">
    <a href="index.html">Home</a>
    <a href="login.html">Login/Sign-Up</a>
    <a href="about.html">About</a>
    <a href="faqs.html">FAQs</a>
    <a href="contact.html">Contact Us</a>
    <a href="admin.html">Admin</a>
  </footer>

  <script>
    function toggleMenu() {
      const nav = document.getElementById('navLinks');
      nav.classList.toggle('mobile-active');
    }

    function getSession(){ return JSON.parse(sessionStorage.getItem('sessionUser') || localStorage.getItem('sessionUser') || 'null'); }
    function logout(){ sessionStorage.removeItem('sessionUser'); localStorage.removeItem('sessionUser'); window.location.href='login.html'; }
    const session = getSession();
    if (!session) window.location.href = 'login.html';
    if (session && session.role === 'admin') window.location.href = 'admin-dashboard.html';

    const all = JSON.parse(localStorage.getItem('customBuildsByUser') || '{}');
    const builds = (session && all[session.email]) || [];
    const list = document.getElementById('list');

    if (!builds.length) {
      list.innerHTML = '<div class="card">No saved builds yet. Build one in <a href="builder.html" style="color:#8DD6D3;">Custom Keyboards</a>.</div>';
    } else {
      list.innerHTML = builds.map((b, idx) => `
        <div class="card">
          <h3>${b.name || 'Custom Keyboard'}</h3>
          <p class="line"><strong>Price:</strong> ${b.price}</p>
          <p class="line"><strong>Usage:</strong> ${b.usage}</p>
          <p class="line"><strong>Sound:</strong> ${b.sound}</p>
          <p class="line"><strong>Feel:</strong> ${b.feel}</p>
          <p class="line"><strong>Size:</strong> ${b.size}</p>
          <p class="line"><strong>Style:</strong> ${b.style}</p>
          <p class="line"><small>Saved: ${new Date(b.savedAt).toLocaleString()}</small></p>
          <div class="actions">
            <button class="btn btn-modify" onclick="modifyBuild(${idx})">Modify</button>
            <button class="btn btn-delete" onclick="deleteBuild(${idx})">Delete</button>
            <button class="btn btn-cart" onclick="addBuildToCart(${idx})">Add to Cart</button>
          </div>
        </div>
      `).join('');
    }

    function modifyBuild(index) {
      const target = builds[index];
      if (!target) return;
      localStorage.setItem('pendingBuildEdit', JSON.stringify(target));
      window.location.href = 'build.html';
    }

    function addBuildToCart(index) {
      const target = builds[index];
      if (!target) return;

      const userCarts = JSON.parse(localStorage.getItem('userCarts') || '{}');
      if (!userCarts[session.email]) userCarts[session.email] = [];
      userCarts[session.email].push({
        name: target.name || 'Custom Keyboard',
        price: target.price || '$199.99',
        image: 'images/custom-keyboard.jpg',
        description: `Custom built: ${target.usage || 'N/A'} | ${target.sound || 'N/A'} | ${target.feel || 'N/A'} | ${target.size || 'N/A'} | ${target.style || 'N/A'}`,
        quantity: 1
      });
      localStorage.setItem('userCarts', JSON.stringify(userCarts));
      alert('Saved custom build added to cart.');
    }

    function deleteBuild(index) {
      const target = builds[index];
      if (!target) return;
      if (!confirm('Delete this saved build?')) return;

      const allBuilds = JSON.parse(localStorage.getItem('customBuildsByUser') || '{}');
      const userBuilds = allBuilds[session.email] || [];
      userBuilds.splice(index, 1);
      allBuilds[session.email] = userBuilds;
      localStorage.setItem('customBuildsByUser', JSON.stringify(allBuilds));
      window.location.reload();
    }
  </script>
</body>
</html>
