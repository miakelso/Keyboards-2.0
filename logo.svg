<svg viewBox="0 0 400 450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="450" fill="#fef5e7"/>
  
  <!-- Keyboard with flames -->
  <g id="keyboard-group">
    <!-- Flames -->
    <path d="M 120 80 Q 100 60 110 40 Q 115 50 130 35 Q 140 55 150 40 Q 155 65 170 50 Q 175 70 180 50 Q 190 75 200 55" fill="#ff6a00" stroke="#ff6a00" stroke-width="2"/>
    <path d="M 120 90 Q 105 70 115 50 Q 120 60 135 45 Q 145 65 155 50 Q 160 75 175 60 Q 180 80 190 60" fill="#ff8a33" stroke="#ff8a33" stroke-width="1"/>
    
    <!-- Keyboard body -->
    <rect x="80" y="120" width="240" height="120" rx="10" fill="none" stroke="#ff6a00" stroke-width="8"/>
    
    <!-- Keyboard keys grid -->
    <g id="keys" stroke="#ff6a00" stroke-width="2" fill="none">
      <!-- Row 1 -->
      <rect x="90" y="130" width="18" height="18"/>
      <rect x="112" y="130" width="18" height="18"/>
      <rect x="134" y="130" width="18" height="18"/>
      <rect x="156" y="130" width="18" height="18"/>
      <rect x="178" y="130" width="18" height="18"/>
      <rect x="200" y="130" width="18" height="18"/>
      <rect x="222" y="130" width="18" height="18"/>
      <rect x="244" y="130" width="18" height="18"/>
      
      <!-- Row 2 -->
      <rect x="90" y="152" width="18" height="18"/>
      <rect x="112" y="152" width="18" height="18"/>
      <rect x="134" y="152" width="18" height="18"/>
      <rect x="156" y="152" width="18" height="18"/>
      <rect x="178" y="152" width="18" height="18"/>
      <rect x="200" y="152" width="18" height="18"/>
      <rect x="222" y="152" width="18" height="18"/>
      <rect x="244" y="152" width="18" height="18"/>
      
      <!-- Row 3 -->
      <rect x="90" y="174" width="18" height="18"/>
      <rect x="112" y="174" width="18" height="18"/>
      <rect x="134" y="174" width="18" height="18"/>
      <rect x="156" y="174" width="18" height="18"/>
      <rect x="178" y="174" width="18" height="18"/>
      <rect x="200" y="174" width="18" height="18"/>
      <rect x="222" y="174" width="18" height="18"/>
    </g>
    
    <!-- Key labels -->
    <text x="99" y="143" font-size="10" font-weight="bold" fill="#ff6a00">W</text>
    <text x="121" y="143" font-size="10" font-weight="bold" fill="#ff6a00">E</text>
    <text x="143" y="143" font-size="10" font-weight="bold" fill="#ff6a00">R</text>
    <text x="165" y="143" font-size="10" font-weight="bold" fill="#ff6a00">Y</text>
    <text x="187" y="143" font-size="10" font-weight="bold" fill="#ff6a00">U</text>
    <text x="209" y="143" font-size="10" font-weight="bold" fill="#ff6a00">I</text>
    <text x="231" y="143" font-size="10" font-weight="bold" fill="#ff6a00">P</text>
    <text x="253" y="143" font-size="10" font-weight="bold" fill="#ff6a00">P</text>
    
    <text x="99" y="165" font-size="10" font-weight="bold" fill="#ff6a00">A</text>
    <text x="121" y="165" font-size="10" font-weight="bold" fill="#ff6a00">S</text>
    <text x="143" y="165" font-size="10" font-weight="bold" fill="#ff6a00">D</text>
    <text x="165" y="165" font-size="10" font-weight="bold" fill="#ff6a00">F</text>
    <text x="187" y="165" font-size="10" font-weight="bold" fill="#ff6a00">G</text>
    <text x="209" y="165" font-size="10" font-weight="bold" fill="#ff6a00">K</text>
    <text x="231" y="165" font-size="10" font-weight="bold" fill="#ff6a00">L</text>
    
    <text x="99" y="187" font-size="10" font-weight="bold" fill="#ff6a00">Z</text>
    <text x="121" y="187" font-size="10" font-weight="bold" fill="#ff6a00">X</text>
    <text x="143" y="187" font-size="10" font-weight="bold" fill="#ff6a00">C</text>
    <text x="165" y="187" font-size="10" font-weight="bold" fill="#ff6a00">V</text>
    <text x="187" y="187" font-size="10" font-weight="bold" fill="#ff6a00">B</text>
    <text x="209" y="187" font-size="10" font-weight="bold" fill="#ff6a00">N</text>
    
    <!-- Spacebar -->
    <rect x="120" y="196" width="160" height="16" rx="4" fill="none" stroke="#ff6a00" stroke-width="2"/>
    
    <!-- Keyboard decorative bottom -->
    <path d="M 85 240 Q 200 280 315 240" fill="none" stroke="#ff6a00" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Text "FORGE" -->
  <text x="200" y="360" font-size="72" font-weight="bold" fill="#ff6a00" text-anchor="middle" font-family="Arial, sans-serif" letter-spacing="2">FORGE</text>
</svg>